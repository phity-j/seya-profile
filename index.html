<script>
  fetch('content.json')
    .then(response => response.json())
    .then(data => {
      document.getElementById('masthead-label').textContent = data.mastheadLabel || '';
      document.getElementById('hero-title').textContent = data.title || '';
      document.getElementById('hero-subtitle').textContent = data.subtitle || '';
      document.getElementById('author-name').textContent = data.author || '';
      document.getElementById('lead-text').textContent = data.lead || '';
      document.getElementById('pull-quote-text').textContent = data.pullQuote || '';
      document.getElementById('photo-caption').textContent = data.photoCaption || '';
      document.getElementById('footer-note').textContent = data.footerNote || '';
      document.getElementById('footer-tag').textContent = data.footerTag || '';

      if (data.chapters && Array.isArray(data.chapters)) {
        const c1 = document.getElementById('chapters-container');
        const c2 = document.getElementById('chapters-container-2');
        const c3 = document.getElementById('chapters-container-3');
        
        data.chapters.forEach((chapter, index) => {
          const section = document.createElement('div');
          section.className = 'section';
          
          let html = '<div class="section-label">' + chapter.label + '</div>';
          html += '<h2>' + chapter.title + '</h2>';
          
          // Parse markdown using marked.js
          const rawHtml = marked.parse(chapter.body || '');
          // Replace timeline markdown with appropriate HTML classes if matched
          let finalHtml = rawHtml.replace(/<p>&lt;div class=&quot;timeline-item&quot;&gt;(.*?)&lt;\/div&gt;<\/p>/g, '<div class="timeline-item">$1</div>');
          
          html += '<div>' + finalHtml + '</div>';
          section.innerHTML = html;

          if (index < 1) {
            c1.appendChild(section);
          } else if (index < 3) {
            c2.appendChild(section);
          } else {
            c3.appendChild(section);
          }
        });
      }
    })
    .catch(err => console.error('Error loading content.json:', err));
</script>

</body>
</html>
