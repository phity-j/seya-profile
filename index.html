<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築構造とリスク解析を振り返って</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #3d3d5c;
    --paper: #faf8f3;
    --cream: #f2ede3;
    --accent: #8b4513;
    --accent-light: #c4783a;
    --rule: #c8bfad;
    --gold: #b8960c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    line-height: 1.9;
    font-size: 17px;
  }

  /* Header / Masthead */
  .masthead {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }

  .masthead-title {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .masthead-label {
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    opacity: 0.6;
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
    padding: 70px 40px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--accent) 100%);
  }

  .hero-inner {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .column-tag {
    display: inline-block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 14px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 2.4rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  .hero-subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-bottom: 36px;
    border-left: 3px solid var(--accent-light);
    padding-left: 16px;
  }

  .author-block {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }

  .author-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--paper);
    font-family: 'EB Garamond', serif;
    font-size: 20px;
    font-style: italic;
    flex-shrink: 0;
  }

  .author-info {
    font-family: 'Noto Sans JP', sans-serif;
  }

  .author-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .author-role {
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  /* Article body */
  .article-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 40px 80px;
  }

  .lead {
    font-size: 19px;
    line-height: 2.0;
    color: var(--ink-light);
    font-weight: 300;
    margin-bottom: 52px;
    padding: 28px 32px;
    background: var(--cream);
    border-left: 4px solid var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .section {
    margin-bottom: 52px;
  }

  .section-label {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .section h2 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--ink);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .section p {
    margin-bottom: 20px;
    color: var(--ink);
    font-weight: 300;
  }

  /* Pull quote */
  .pull-quote {
    margin: 44px 0;
    padding: 32px 40px;
    background: var(--ink);
    color: var(--paper);
    position: relative;
  }

  .pull-quote::before {
    content: '\201C';
    font-family: 'EB Garamond', serif;
    font-size: 80px;
    color: var(--accent-light);
    position: absolute;
    top: -10px;
    left: 24px;
    line-height: 1;
    opacity: 0.7;
  }

  .pull-quote p {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.15rem;
    line-height: 2.0;
    font-weight: 300;
    padding-left: 20px;
    color: var(--paper) !important;
  }

  /* Key terms */
  .term {
    color: var(--accent);
    font-weight: 600;
  }

  /* Timeline accent */
  .timeline-item {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    align-items: flex-start;
  }

  .timeline-year {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    min-width: 60px;
    padding-top: 2px;
    font-style: italic;
  }

  .timeline-text {
    font-size: 16px;
    color: var(--ink-light);
    font-weight: 300;
    border-left: 2px solid var(--rule);
    padding-left: 16px;
    line-height: 1.8;
  }

  /* Footer rule */
  .article-footer {
    margin-top: 64px;
    padding-top: 28px;
    border-top: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-note {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .footer-tag {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-style: italic;
  }

  /* Photo block */
  .photo-block {
    margin: 36px 0;
    text-align: center;
  }

  .article-photo {
    width: 100%;
    max-width: 620px;
    height: auto;
    display: block;
    margin: 0 auto;
    border: 1px solid var(--rule);
    filter: sepia(15%);
  }

  .photo-caption {
    margin-top: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
    letter-spacing: 0.05em;
    font-style: italic;
    text-align: center;
  }
</style>
</head>
<body>

<header class="masthead">
  <span class="masthead-title"></span>
  <span id="masthead-label" class="masthead-label"></span>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1 id="hero-title"></h1>
    <p id="hero-subtitle" class="hero-subtitle"></p>
    <div class="author-block">
      <div class="author-info">
        <div id="author-name" class="author-name" style="font-size:18px; letter-spacing:0.12em;"></div>
      </div>
    </div>
  </div>
</section>

<article class="article-wrap">
  <div id="lead-text" class="lead"></div>

  <div id="chapters-container"></div>

  <div class="pull-quote">
    <p id="pull-quote-text"></p>
  </div>

  <div id="chapters-container-2"></div>

  <div class="photo-block">
    <img src="assets/photo.jpg" alt="Photo" class="article-photo">
    <p id="photo-caption" class="photo-caption"></p>
  </div>

  <div id="chapters-container-3"></div>

  <footer class="article-footer">
    <div id="footer-note" class="footer-note"></div>
    <div id="footer-tag" class="footer-tag"></div>
  </footer>
</article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('content.json')
    .then(response => response.json())
    .then(data => {
      document.getElementById('masthead-label').textContent = data.mastheadLabel || '';
      document.getElementById('hero-title').textContent = data.title || '';
      document.getElementById('hero-subtitle').textContent = data.subtitle || '';
      document.getElementById('author-name').textContent = data.author || '';
      document.getElementById('lead-text').textContent = data.lead || '';
      document.getElementById('pull-quote-text').textContent = data.pullQuote || '';
      document.getElementById('photo-caption').textContent = data.photoCaption || '';
      document.getElementById('footer-note').textContent = data.footerNote || '';
      document.getElementById('footer-tag').textContent = data.footerTag || '';

      if (data.chapters && Array.isArray(data.chapters)) {
        const c1 = document.getElementById('chapters-container');
        const c2 = document.getElementById('chapters-container-2');
        const c3 = document.getElementById('chapters-container-3');

        data.chapters.forEach((chapter, index) => {
          const section = document.createElement('div');
          section.className = 'section';

          let html = '<div class="section-label">' + chapter.label + '</div>';
          html += '<h2>' + chapter.title + '</h2>';

          // Parse markdown using marked.js
          const rawHtml = marked.parse(chapter.body || '');
          // Replace timeline markdown with appropriate HTML classes if matched
          let finalHtml = rawHtml.replace(/<p>&lt;div class=&quot;timeline-item&quot;&gt;(.*?)&lt;\/div&gt;<\/p>/g, '<div class="timeline-item">$1</div>');

          html += '<div>' + finalHtml + '</div>';
          section.innerHTML = html;

          if (index < 1) {
            c1.appendChild(section);
          } else if (index < 3) {
            c2.appendChild(section);
          } else {
            c3.appendChild(section);
          }
        });
      }
    })
    .catch(err => console.error('Error loading content.json:', err));
</script>

</body>
</html>
